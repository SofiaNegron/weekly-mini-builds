<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock & Bloom Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-container">
    <header>
        <h1 class="title">Lock & Bloom Password Generator</h1>
        <p>Choose how many letters, symbols, and numbers you want, then generate a randomized password.</p>
    </header>
    <div class="widget-container">
        <div class="userInput">
            <div class="input-row">
                <label for="nLetters">How many letters would you like?</label>
                <input type="number" id="nLetters" name="nLetters" value="6" min="0">
            </div>
            <div class="input-row">
                <label for="nSymbols" class="nSymbosl">How many symbols would you like?</label>
                <input type="number" id="nSymbols" name="nSymbols" value="4" min="0">
            </div>
            <div class="input-row">
                <label for="nNumbers" class="nNumbers">How many numbers would you like?</label>
                <input type="number" id="nNumbers" name="nNumbers" value="5" min="0">
            </div>

        </div>

        <div class="generateButton">
            <button id="generateButton">Generate Password</button>
        </div>

        <div class="generatedPassword">
            <output id="passwordResult" name="passwordResult"></output>
        </div>
        <div class="statusMessage" id="statusMessage">

        </div>
    </div>

</div>
<img src="images/garden.png" alt="" class="garden-image" id="gardenImage" aria-hidden="true">
<script src="script.js"></script>
</body>
</html>
